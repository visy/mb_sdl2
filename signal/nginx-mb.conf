# Drop-in nginx snippet for Mine Bombers WebRTC signaling.
# Include INSIDE your existing quad.fi server { ... } block (the same one
# serving /usr/share/nginx/html). Adds a WebSocket reverse-proxy at /mb/ws
# without touching the static /mb/ location.
#
# Example placement in /etc/nginx/conf.d/quad.fi.conf (or your server block):
#
#   server {
#       listen 443 ssl http2;
#       server_name quad.fi;
#       root /usr/share/nginx/html;
#       # ... existing config ...
#       include /etc/nginx/snippets/mb-signal.conf;   # <-- this file
#   }

location = /mb/ws {
    # Cap concurrent WS connections per source IP to mitigate flood abuse.
    # Requires the matching `limit_conn_zone` line in the http {} block of
    # /etc/nginx/nginx.conf -- see README.deploy.md.
    limit_conn mb_ws 8;

    proxy_pass http://127.0.0.1:7000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket connections are long-lived; raise read timeout.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
